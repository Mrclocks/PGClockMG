<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrClock-MG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v=2.1.4">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="app">

    <header class="header">
      <div class="header-brand">
        <div class="logo">🕐</div>
        <div>
          <h1>MrClock-MG</h1>
          <p class="subtitle"></p>
        </div>
      </div>
      <div class="header-meta">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" data-lang="fa" onclick="setLang('fa')">FA</button>
          <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
        </div>
        <span class="badge" id="serverIp">—</span>
        <span class="version" id="appVersion">v2.1.4</span>
      </div>
    </header>

    <nav class="steps" id="stepsNav"></nav>

    <main class="main">

      <!-- Welcome -->
      <section class="panel active" id="panel-welcome">
        <div class="welcome-card">
          <div class="welcome-header">
            <h2 id="welcomeH2"></h2>
            <p class="desc" id="welcomeDesc"></p>
          </div>
          <div class="welcome-body">
            <p class="welcome-note" id="welcomeNote"></p>
            <div class="info-box" id="welcomeBackupTip"></div>
          </div>
          <div class="welcome-actions">
            <button class="btn btn-primary btn-lg btn-start" id="btnWelcomeStart" onclick="startWizard()"></button>
          </div>
        </div>
      </section>

      <!-- PasarGuard setup -->
      <section class="panel" id="panel-pg">
        <h2 id="pgH2"></h2>
        <p class="desc" id="pgDesc"></p>

        <div id="pgInstalledCard" class="success-card hidden">
          <h3 id="pgInstalledTitle"></h3>
          <p id="pgInstalledDetail"></p>
          <div class="actions">
            <button class="btn btn-ghost" onclick="showPhase('welcome')"></button>
            <button class="btn btn-primary" id="btnPgContinue" onclick="showPhase('choose')"></button>
          </div>
        </div>

        <div id="pgInstallForm" class="hidden">
          <div class="info-box" id="pgDbMatchTip"></div>

          <div class="form-group">
            <label id="lblPgDb"></label>
            <div class="db-grid" id="pgDbGrid"></div>
          </div>

          <div class="form-group">
            <label id="lblPgSsl"></label>
            <p class="desc-sm" id="pgSslMustChoose"></p>
            <div class="choice-grid" id="pgSslGrid">
              <button type="button" class="choice-card" data-ssl="yes" id="btnPgSslYes">
                <strong id="pgSslYes"></strong>
                <span id="pgSslYesDesc"></span>
              </button>
              <button type="button" class="choice-card" data-ssl="no" id="btnPgSslNo">
                <strong id="pgSslNo"></strong>
                <span id="pgSslNoDesc"></span>
              </button>
            </div>
          </div>

          <div id="pgAfterSsl" class="hidden">
            <div id="pgSslYesFields" class="hidden">
              <div class="form-group">
                <label id="lblPgDomain"></label>
                <input type="text" id="pgDomain" placeholder="panel.example.com" autocomplete="off">
                <p class="desc-sm" id="pgDomainHint"></p>
              </div>
              <div class="form-group">
                <label id="lblPgIp"></label>
                <input type="text" id="pgIp" placeholder="1.2.3.4" autocomplete="off">
                <p class="desc-sm" id="pgIpHint"></p>
              </div>
              <div class="form-group">
                <label id="lblPgSslPort"></label>
                <input type="number" id="pgSslHttpPort" value="80" min="1" max="65535" autocomplete="off">
                <p class="desc-sm" id="pgSslPortHint"></p>
              </div>
            </div>

            <div id="pgSslNoHint" class="info-box hidden"></div>

            <div id="pgInstallBlock" class="block-msg hidden"></div>
            <div class="actions">
              <button class="btn btn-ghost" onclick="showPhase('welcome')" id="btnPgBack"></button>
              <button class="btn btn-primary" id="btnPgInstall" onclick="startPgInstall()"></button>
            </div>
          </div>
        </div>

        <div id="pgInstallProgress" class="hidden">
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="pgProgressFill" style="width:0%"></div></div>
            <span class="progress-text" id="pgProgressText">0%</span>
          </div>
          <p class="status-msg" id="pgStatusMsg"></p>
          <div class="log-terminal" id="pgLogTerminal"></div>
        </div>

        <div id="pgInstallDone" class="hidden">
          <div class="result-card success">
            <div class="result-icon">✅</div>
            <h2 id="pgDoneTitle"></h2>
            <div id="pgDoneNotes" class="post-migrate"></div>
            <div class="actions" style="justify-content:center;margin-top:16px">
              <button class="btn btn-primary" onclick="showPhase('choose')" id="btnPgDoneNext"></button>
            </div>
          </div>
        </div>
      </section>

      <!-- Choose path -->
      <section class="panel" id="panel-choose">
        <h2 id="chooseH2"></h2>
        <p class="desc" id="chooseDesc"></p>
        <div class="choice-grid choice-grid-3">
          <button type="button" class="choice-card choice-card-lg" onclick="choosePath('finish')">
            <span class="choice-icon">🚪</span>
            <strong id="chooseFinish"></strong>
            <span id="chooseFinishDesc"></span>
          </button>
          <button type="button" class="choice-card choice-card-lg" onclick="choosePath('restore')">
            <span class="choice-icon">📦</span>
            <strong id="chooseRestore"></strong>
            <span id="chooseRestoreDesc"></span>
          </button>
          <button type="button" class="choice-card choice-card-lg" onclick="choosePath('migrate')">
            <span class="choice-icon">🔄</span>
            <strong id="chooseMigrate"></strong>
            <span id="chooseMigrateDesc"></span>
          </button>
        </div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="showPhase('pg')" id="btnChooseBack"></button>
        </div>
      </section>

      <!-- Restore -->
      <section class="panel" id="panel-restore">
        <h2 id="restoreH2"></h2>
        <p class="desc" id="restoreDesc"></p>
        <div class="warning-card" id="restoreDbTip"></div>

        <div class="upload-zone" id="restoreUploadZone">
          <input type="file" id="restoreFileInput" accept=".zip" hidden>
          <div class="upload-icon">📦</div>
          <p><span id="restoreDragText"></span> <span class="link" id="restoreSelectText"></span></p>
        </div>
        <div id="restoreUploadStatus" class="upload-status hidden"></div>
        <div id="restoreAnalysis" class="summary-card hidden"></div>
        <div id="restoreWarnings" class="warnings-box hidden"></div>
        <div id="restoreBlock" class="block-msg hidden"></div>

        <div class="actions">
          <button class="btn btn-ghost" onclick="showPhase('choose')" id="btnRestoreBack"></button>
          <button class="btn btn-primary" id="btnRestoreConfirm" disabled onclick="startRestore()"></button>
        </div>

        <div id="restoreProgress" class="hidden" style="margin-top:20px">
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="restoreProgressFill" style="width:0%"></div></div>
            <span class="progress-text" id="restoreProgressText">0%</span>
          </div>
          <p class="status-msg" id="restoreStatusMsg"></p>
          <div class="log-terminal" id="restoreLogTerminal"></div>
        </div>

        <div id="restoreDone" class="hidden">
          <div class="result-card success">
            <div class="result-icon">✅</div>
            <h2 id="restoreDoneTitle"></h2>
            <p id="restoreDoneMsg"></p>
            <a class="btn btn-primary btn-lg" id="restorePanelLink" href="#" target="_blank"></a>
            <div id="restoreAccessNotes" class="post-migrate"></div>
          </div>
        </div>
      </section>

      <!-- Migration steps (existing) -->
      <section class="panel" id="step1">
        <h2></h2>
        <p class="desc"></p>
        <div class="panel-grid" id="panelGrid"></div>
        <div id="marzbanModeSection" class="hidden" style="display:none"></div>
        <div id="panelInstallNotes" class="info-box hidden"></div>
        <div id="panelWarnings" class="warnings-box hidden"></div>
        <div id="panelPrereqs" class="checks-list hidden"></div>
        <div id="step1Block" class="block-msg hidden"></div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="showPhase('choose')"></button>
          <button class="btn btn-primary" id="btnStep1" disabled onclick="goStep(2)"></button>
        </div>
      </section>

      <section class="panel" id="step2">
        <h2></h2>
        <p class="desc"></p>

        <div id="marzbanSourceSection" class="info-box hidden">
          <strong id="marzbanDetectedDbLabel"></strong>
          <p style="margin-top:8px;font-size:1.1rem"><span id="marzbanDetectedDbValue">—</span></p>
          <p class="desc-sm" id="marzbanDetectedDbHint"></p>
        </div>

        <div class="db-grid" id="sourceDbGrid"></div>

        <div id="remnawaveFields" class="hidden">
          <div class="form-group">
            <label></label>
            <input type="url" id="remnawaveUrl" placeholder="" autocomplete="off">
          </div>
          <div class="form-group">
            <label></label>
            <input type="password" id="remnawaveToken" placeholder="" autocomplete="off">
          </div>
        </div>

        <div id="sourceDbCredentials" class="db-credentials hidden">
          <div class="info-box cred-hint-box">
            <p id="sourceCredHint"></p>
            <div class="install-cmd-row">
              <div class="install-cmd-box"><code id="sourceEnvCmd">nano /opt/marzban/.env</code></div>
              <button type="button" class="btn btn-copy" id="btnCopySourceEnv" onclick="copyEnvCmd('source')"></button>
            </div>
          </div>
          <div id="sourcePasswordCandidates" class="pwd-candidates hidden"></div>
          <div class="db-cred-grid">
            <div class="form-group"><label id="lblSourceDbUser"></label><input type="text" id="sourceDbUser" autocomplete="off"></div>
            <div class="form-group"><label id="lblSourceDbName"></label><input type="text" id="sourceDbName" autocomplete="off"></div>
            <div class="form-group"><label id="lblSourceDbHost"></label><input type="text" id="sourceDbHost" value="127.0.0.1" autocomplete="off"></div>
            <div class="form-group"><label id="lblSourceDbPort"></label><input type="text" id="sourceDbPort" autocomplete="off" placeholder="3306 / 5432"></div>
          </div>
        </div>

        <div id="uploadSection" class="upload-section hidden">
          <h3 id="uploadSectionTitle"></h3>
          <p class="desc-sm" id="uploadSectionDesc"></p>

          <div class="upload-mode-tabs" id="uploadModeTabs">
            <button type="button" class="upload-mode-btn active" data-mode="zip" id="uploadModeZip"></button>
            <button type="button" class="upload-mode-btn" data-mode="separate" id="uploadModeSeparate"></button>
          </div>

          <div id="uploadZipPanel">
            <div class="upload-zone" id="uploadZone" data-slot="bundle_zip">
              <input type="file" id="fileInputZip" accept=".zip" hidden>
              <div class="upload-icon">📦</div>
              <p><span id="uploadDragText"></span> <span class="link" id="uploadSelectText"></span></p>
            </div>
          </div>

          <div id="uploadSeparatePanel" class="hidden">
            <div id="uploadSlots" class="upload-slots"></div>
          </div>

          <div id="uploadBundleStatus" class="upload-bundle-status hidden"></div>
          <div id="uploadStatus" class="upload-status hidden"></div>
          <div id="uploadInventory" class="upload-inventory hidden"></div>
        </div>

        <div id="uploadNotNeeded" class="info-box hidden"></div>

        <div id="step2Block" class="block-msg hidden"></div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="goStep(1)"></button>
          <button class="btn btn-primary" id="btnStep2" onclick="goStep(3)"></button>
        </div>
      </section>

      <section class="panel" id="step3">
        <h2></h2>
        <p class="desc"></p>
        <div id="detectedTargetDb" class="detected-db-card hidden"></div>
        <div id="crossDbWarning" class="warning-card hidden"></div>
        <div id="targetDbCredentials" class="db-credentials hidden">
          <div class="info-box cred-hint-box">
            <p id="targetCredHint"></p>
            <div class="install-cmd-row">
              <div class="install-cmd-box"><code id="targetEnvCmd">sudo nano /opt/pasarguard/.env</code></div>
              <button type="button" class="btn btn-copy" id="btnCopyTargetEnv" onclick="copyEnvCmd('target')"></button>
            </div>
          </div>
          <div id="targetPasswordCandidates" class="pwd-candidates hidden"></div>
          <input type="hidden" id="targetDbUser" value="pasarguard">
          <input type="hidden" id="targetDbName" value="pasarguard">
          <input type="hidden" id="targetDbHost" value="127.0.0.1">
          <input type="hidden" id="targetDbPort" value="">
        </div>

        <div id="installPgSection" class="warning-card hidden">
          <h4></h4>
          <p></p>
          <p class="desc-sm" id="installPgHint"></p>
          <div class="install-cmd-box"><code id="installPgCmd"></code></div>
          <button class="btn btn-secondary" id="btnRecheckPg" onclick="recheckPasarguard()"></button>
        </div>

        <div id="step3Block" class="block-msg hidden"></div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="goStep(2)"></button>
          <button class="btn btn-primary" id="btnStep3" onclick="goStep(4)"></button>
        </div>
      </section>

      <section class="panel" id="step4">
        <h2></h2>
        <p class="desc"></p>
        <div class="summary-card" id="migrationSummary"></div>
        <div id="redirectOption" class="option-card hidden">
          <label class="checkbox-label">
            <input type="checkbox" id="installRedirect" checked>
            <span></span>
          </label>
        </div>
        <div class="warning-card" id="finalWarnings"></div>
        <div id="step4Block" class="block-msg hidden"></div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="goStep(3)"></button>
          <button class="btn btn-primary btn-lg" id="btnStep4" onclick="startMigration()"></button>
        </div>
      </section>

      <section class="panel" id="step5">
        <h2></h2>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <span class="progress-text" id="progressText">0%</span>
        </div>
        <p class="status-msg" id="statusMsg"></p>
        <div class="log-terminal" id="logTerminal"></div>
      </section>

      <section class="panel" id="step6">
        <div id="resultSuccess" class="result-card success hidden">
          <div class="result-icon">✅</div>
          <h2></h2>
          <p id="resultMessage"></p>
          <a class="btn btn-primary btn-lg" id="panelLink" href="#" target="_blank"></a>
          <div id="postMigrateSection" class="post-migrate hidden">
            <div class="post-migrate-tip" id="groupBulkTip"></div>
            <h3 class="post-migrate-title" id="incompleteTransferTitle"></h3>
            <div id="incompleteTransferGrid" class="incomplete-transfer-grid"></div>
          </div>
          <div id="resultDetails" class="result-details"></div>
        </div>
        <div id="resultError" class="result-card error hidden">
          <div class="result-icon">❌</div>
          <h2></h2>
          <p id="errorMessage"></p>
          <div class="log-terminal" id="errorLog"></div>
          <button class="btn btn-secondary" onclick="goStep(4)"></button>
        </div>
      </section>

    </main>

    <footer class="footer">
      <span>MrClock-MG</span>
      <span>·</span>
      <a href="https://docs.pasarguard.org/en/panel/installation/" target="_blank" id="footerDocs"></a>
      <span>·</span>
      <a href="https://github.com/PasarGuard/panel" target="_blank" id="footerGithub"></a>
    </footer>
  </div>

  <script src="/static/js/i18n.js?v=2.1.4"></script>
  <script src="/static/js/app.js?v=2.1.4"></script>
  <script src="/static/js/wizard-flow.js?v=2.1.4"></script>
</body>
</html>
